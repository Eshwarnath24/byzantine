<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HotStuff BFT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'IBM Plex Mono', monospace; background: #0f1117; color: #e2e8f0; }
  .node { transition: all 0.3s; }
  .log-entry { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; } }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
</style>
</head>
<body class="min-h-screen p-8">

  <div class="max-w-2xl mx-auto">

    <!-- Title -->
    <div class="mb-8">
      <h1 class="text-2xl font-semibold text-white mb-1">HotStuff BFT</h1>
      <p class="text-sm text-slate-500">Byzantine Fault Tolerant Consensus — 4 nodes, f=1, quorum=3</p>
    </div>

    <!-- Nodes -->
    <div class="mb-6">
      <p class="text-xs text-slate-500 uppercase tracking-widest mb-3">Nodes</p>
      <div class="grid grid-cols-4 gap-3" id="nodes">
        <!-- injected by JS -->
      </div>
    </div>

    <!-- Controls -->
    <div class="flex gap-3 mb-6">
      <button onclick="startRound()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm px-5 py-2 rounded transition">
        ▶ Start Round
      </button>
      <button onclick="makeByzantine()" class="bg-red-800 hover:bg-red-700 text-white text-sm px-5 py-2 rounded transition">
        ☠ Make Node 4 Byzantine
      </button>
      <button onclick="resetAll()" class="bg-slate-700 hover:bg-slate-600 text-white text-sm px-5 py-2 rounded transition">
        ↺ Reset
      </button>
    </div>

    <!-- Status bar -->
    <div class="bg-slate-800 rounded-lg p-4 mb-4 flex items-center justify-between text-sm">
      <div>
        <span class="text-slate-400">View:</span>
        <span class="text-white font-semibold ml-2" id="viewNum">1</span>
      </div>
      <div>
        <span class="text-slate-400">Leader:</span>
        <span class="text-yellow-400 font-semibold ml-2" id="leaderLabel">—</span>
      </div>
      <div>
        <span class="text-slate-400">Committed:</span>
        <span class="text-emerald-400 font-semibold ml-2" id="committed">0</span>
      </div>
      <div id="statusBadge" class="text-xs px-3 py-1 rounded-full bg-slate-700 text-slate-400">IDLE</div>
    </div>

    <!-- Log -->
    <div class="bg-slate-900 rounded-lg p-4 border border-slate-700" style="min-height: 260px;">
      <p class="text-xs text-slate-500 uppercase tracking-widest mb-3">Event Log</p>
      <div id="log" class="space-y-1 text-sm"></div>
    </div>

  </div>

<script>
const nodes = [
  { id: 1, byzantine: false },
  { id: 2, byzantine: false },
  { id: 3, byzantine: false },
  { id: 4, byzantine: false },
];
let view = 1, committed = 0, running = false;

function renderNodes(leaderId) {
  const el = document.getElementById('nodes');
  el.innerHTML = nodes.map(n => {
    const isLeader = n.id === leaderId;
    const color = n.byzantine
      ? 'border-red-600 bg-red-950 text-red-400'
      : isLeader
      ? 'border-yellow-500 bg-yellow-950 text-yellow-300'
      : 'border-slate-600 bg-slate-800 text-slate-300';
    const icon = n.byzantine ? '☠' : isLeader ? '★' : '●';
    const label = n.byzantine ? 'Byzantine' : isLeader ? 'Leader' : 'Replica';
    return `
      <div class="node border rounded-lg p-3 text-center ${color}">
        <div class="text-xl mb-1">${icon}</div>
        <div class="font-semibold">Node ${n.id}</div>
        <div class="text-xs opacity-70 mt-0.5">${label}</div>
        <div class="text-xs opacity-50">:800${n.id}</div>
      </div>
    `;
  }).join('');
}

function log(msg, color = 'text-slate-300') {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('en', { hour12: false });
  const div = document.createElement('div');
  div.className = `log-entry ${color}`;
  div.innerHTML = `<span class="text-slate-600 text-xs">${time}</span>  ${msg}`;
  el.insertBefore(div, el.firstChild);
  while (el.children.length > 30) el.removeChild(el.lastChild);
}

function setStatus(text, cls) {
  const b = document.getElementById('statusBadge');
  b.textContent = text;
  b.className = `text-xs px-3 py-1 rounded-full ${cls}`;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startRound() {
  if (running) return;
  running = true;

  const n = nodes.length;
  const quorum = 3;
  const leaderIdx = (view - 1) % n;
  const leader = nodes[leaderIdx];

  document.getElementById('viewNum').textContent = view;
  document.getElementById('leaderLabel').textContent = `Node ${leader.id}`;
  renderNodes(leader.id);
  setStatus('PROPOSING', 'bg-yellow-900 text-yellow-300');
  log(`── View ${view} ── Leader: Node ${leader.id}`, 'text-yellow-400 font-semibold');
  await sleep(600);

  if (leader.byzantine) {
    log(`Node ${leader.id} broadcasts CORRUPTED proposal ☠`, 'text-red-400');
  } else {
    log(`Node ${leader.id} broadcasts PROPOSE → block-${view}`, 'text-white');
  }
  await sleep(700);

  // Collect votes
  setStatus('VOTING', 'bg-blue-900 text-blue-300');
  let yes = 0, no = 0;
  for (const n of nodes) {
    if (n.id === leader.id) continue;
    await sleep(400);
    let vote;
    if (leader.byzantine) {
      vote = 'NO'; // honest nodes reject bad checksum
      log(`Node ${n.id} → NO  (bad checksum)`, 'text-red-400');
    } else if (n.byzantine) {
      vote = Math.random() > 0.5 ? 'YES' : 'NO';
      log(`Node ${n.id} → ${vote}  (byzantine flip)`, 'text-red-400');
    } else {
      vote = 'YES';
      log(`Node ${n.id} → YES`, 'text-emerald-400');
    }
    if (vote === 'YES') yes++; else no++;
  }

  await sleep(500);

  // Result
  if (yes + 1 >= quorum) { // +1 for leader's own vote
    setStatus('COMMITTED', 'bg-emerald-900 text-emerald-300');
    log(`QC formed (${yes+1}/${nodes.length} YES) ✓`, 'text-cyan-400');
    await sleep(400);
    committed++;
    document.getElementById('committed').textContent = committed;
    log(`Block ${view} COMMITTED ✓`, 'text-emerald-400 font-semibold');
  } else {
    setStatus('FAILED', 'bg-red-900 text-red-400');
    log(`Quorum not reached (${yes+1}/${quorum} needed) — VIEW CHANGE`, 'text-red-400');
  }

  view++;
  await sleep(800);
  setStatus('IDLE', 'bg-slate-700 text-slate-400');
  running = false;
}

function makeByzantine() {
  const n = nodes.find(x => x.id === 4);
  n.byzantine = !n.byzantine;
  renderNodes(null);
  log(`Node 4 is now ${n.byzantine ? '☠ BYZANTINE (-m flag)' : 'honest'}`, n.byzantine ? 'text-red-400' : 'text-slate-400');
}

function resetAll() {
  running = false; view = 1; committed = 0;
  nodes.forEach(n => n.byzantine = false);
  document.getElementById('viewNum').textContent = '1';
  document.getElementById('leaderLabel').textContent = '—';
  document.getElementById('committed').textContent = '0';
  document.getElementById('log').innerHTML = '';
  setStatus('IDLE', 'bg-slate-700 text-slate-400');
  renderNodes(null);
  log('Reset.', 'text-slate-500');
}

// Init
renderNodes(null);
log('Ready — press Start Round to begin.', 'text-slate-500');
</script>
</body>
</html>
